name: customer-record-json
version: 0.1
description: >
  Focused deterministic enterprise-DLP workload for realistic customer records
  serialized as small JSON documents.

seed: 42

policy:
  rule_count: 10

  families:
    pii:
      weight: 50
      patterns:
        - person_name
        - email_address
        - phone_number
        - street_address
        - social_security_number
        - date_of_birth

    credentials:
      weight: 10
      patterns:
        - api_key
        - access_token
        - bearer_token
        - password

    financial:
      weight: 20
      patterns:
        - credit_card_number
        - bank_account_number
        - routing_number
        - invoice_number

    business_terms:
      weight: 20
      patterns:
        - customer_id
        - support_case_id
        - contract_number

documents:
  count: 10
  progress_interval_records: 5

  scenarios:
    customer_record:
      weight: 100
      fields:
        - customer_id
        - person_name
        - email_address
        - phone_number
        - street_address
        - account_status
        - internal_notes

  formats:
    json:
      weight: 100

  match_distribution:
    clean:
      weight: 25
      matches_per_document:
        minimum: 0
        maximum: 0

    light:
      weight: 50
      matches_per_document:
        minimum: 1
        maximum: 3

    moderate:
      weight: 25
      matches_per_document:
        minimum: 4
        maximum: 8

    heavy:
      weight: 0
      matches_per_document:
        minimum: 9
        maximum: 10

  size_distribution:
    small:
      weight: 100
      minimum_bytes: 700
      maximum_bytes: 4096

validation:
  track_expected_matches: true
  track_expected_replacements: true
  preserve_original_document: true
  generate_clean_control_records: true

  detect:
    - false_positive
    - false_negative
    - incorrect_replacement
    - truncated_replacement
    - malformed_output
    - unexpected_content_change

output:
  policy_file: generated/scale-policy.nol
  records_file: generated/input.jsonl
  manifest_file: generated/generation-manifest.json
  expected_results_file: generated/expected.jsonl
