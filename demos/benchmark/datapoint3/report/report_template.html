<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Data Point 3 Report</title>
  <style>
    :root {
      --bg: #FFFAEF;
      --panel: #fffdfa;
      --ink: #404040;
      --muted: #5f5f5f;
      --line: #D2D2D2;
      --accent: #33B046;
      --accent-strong: #57DE6B;
      --soft-accent: #AFFFBB;
      --warn: #404040;
      --soft-warn: #FFFAEF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background: var(--bg);
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1, h2, h3 { margin: 0 0 12px; }
    p { margin: 0 0 12px; line-height: 1.5; }
    .lede { color: var(--muted); max-width: 900px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 20px;
      margin-top: 18px;
      box-shadow: 0 10px 25px rgba(31,31,27,0.05);
      overflow-x: auto;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }
    .card h3 { font-size: 15px; color: var(--muted); margin-bottom: 8px; }
    .metric { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .subtle { color: var(--muted); font-size: 14px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
      background: var(--panel);
    }
    th, td {
      padding: 10px 12px;
      border: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th { background: #D2D2D2; font-weight: 700; }
    .mode-baseline { background: #FFFAEF; }
    .mode-software { background: #e7ffeb; }
    .mode-placeholder { background: #AFFFBB; }
    details summary { cursor: pointer; font-weight: 700; }
    ul { margin: 10px 0 0 18px; padding-left: 0; }
    .note { background: var(--soft-accent); border-color: var(--accent-strong); }
    .warn { background: var(--soft-warn); border-color: var(--line); }
    .mono { font-family: "SFMono-Regular", Consolas, monospace; }
  </style>
</head>
<body>
  <main>
    __BODY__
  </main>
</body>
</html>
