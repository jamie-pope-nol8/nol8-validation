name: support-ticket-json
version: 0.1
description: >
  Focused deterministic enterprise-DLP workload for realistic support tickets
  serialized as small JSON documents.

seed: 42

policy:
  rule_count: 12
  families:
    pii:
      weight: 35
      patterns:
        - person_name
        - email_address
        - phone_number
    credentials:
      weight: 20
      patterns:
        - api_key
        - access_token
        - password
    financial:
      weight: 20
      patterns:
        - credit_card_number
        - bank_account_number
        - invoice_number
    business_terms:
      weight: 25
      patterns:
        - customer_id
        - support_case_id

documents:
  count: 10
  progress_interval_records: 5
  scenarios:
    support_ticket:
      weight: 100
      fields:
        - support_case_id
        - customer_id
        - person_name
        - email_address
        - issue_summary
        - issue_description
        - internal_notes
  formats:
    json:
      weight: 100
  match_distribution:
    clean:
      weight: 25
      matches_per_document:
        minimum: 0
        maximum: 0
    light:
      weight: 50
      matches_per_document:
        minimum: 1
        maximum: 3
    moderate:
      weight: 25
      matches_per_document:
        minimum: 4
        maximum: 6
  size_distribution:
    small:
      weight: 100
      minimum_bytes: 900
      maximum_bytes: 4096

validation:
  track_expected_matches: true
  track_expected_replacements: true
  preserve_original_document: true
  generate_clean_control_records: true

output:
  policy_file: generated/scale-policy.nol
  records_file: generated/input.jsonl
  manifest_file: generated/generation-manifest.json
  expected_results_file: generated/expected.jsonl
